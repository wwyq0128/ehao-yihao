<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>饿饿一号 · 管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #1A0E2A, #2D1B3D);
  min-height: 100vh;
  color: #E8D0F0;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}
.container { width: 100%; max-width: 640px; }
h1 {
  color: #FFE066;
  font-size: 24px;
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.subtitle {
  color: #8B75A0;
  font-size: 14px;
  margin-bottom: 32px;
}

/* --- Form --- */
.form-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,224,102,0.12);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 32px;
}
.form-card h2 {
  font-size: 16px;
  color: #FFD4B8;
  margin-bottom: 16px;
}
label {
  display: block;
  font-size: 13px;
  color: #A088B0;
  margin-bottom: 6px;
}
input, textarea {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,224,102,0.12);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 15px;
  color: #E8D0F0;
  font-family: inherit;
  transition: border-color 0.2s;
  outline: none;
}
input:focus, textarea:focus {
  border-color: rgba(255,224,102,0.4);
}
textarea {
  min-height: 160px;
  resize: vertical;
  line-height: 1.7;
}
.field { margin-bottom: 16px; }
.btn {
  background: linear-gradient(135deg, #E85D75, #FF7B54);
  border: none;
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 15px;
  color: #FFF;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.2s;
  letter-spacing: 1px;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,224,102,0.12);
  color: #A088B0;
  padding: 6px 14px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.12);
  color: #E85D75;
  border-color: #E85D75;
}

/* --- Letters list --- */
.section-title {
  font-size: 16px;
  color: #FFD4B8;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.letter-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,224,102,0.08);
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.letter-card .info { flex: 1; }
.letter-card .date {
  font-size: 12px;
  color: #8B75A0;
}
.letter-card .title {
  font-size: 15px;
  color: #E8D0F0;
  margin-top: 2px;
}
.letter-card .status {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  margin-right: 12px;
  white-space: nowrap;
}
.letter-card .status.read {
  background: rgba(100,200,150,0.1);
  color: #6CC99A;
}
.letter-card .status.unread {
  background: rgba(255,179,71,0.1);
  color: #FFB347;
}
.letter-card .actions { display: flex; align-items: center; }
.delete-btn {
  background: none;
  border: none;
  color: #8B6070;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  transition: color 0.2s;
}
.delete-btn:hover { color: #E85D75; }
.empty-msg {
  color: #8B75A0;
  text-align: center;
  padding: 40px 0;
  font-size: 14px;
}

.journal-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,224,102,0.08);
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 10px;
}
.journal-card .date {
  font-size: 12px;
  color: #8B75A0;
  margin-bottom: 8px;
}
.journal-card .text {
  font-size: 15px;
  color: #E8D0F0;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
}
.journal-card .actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}

/* --- Login --- */
#login-screen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 60vh;
}
#login-screen h1 {
  font-size: 28px;
  margin-bottom: 8px;
}
#login-screen .subtitle { margin-bottom: 40px; }
#login-screen input {
  width: 280px;
  text-align: center;
}
#login-screen .btn { margin-top: 16px; width: 280px; }
.error-msg {
  color: #E85D75;
  font-size: 13px;
  margin-top: 8px;
  text-align: center;
}
.success-msg {
  color: #6CC99A;
  font-size: 13px;
  margin-top: 8px;
  text-align: center;
}
#main-screen.hidden { display: none; }
#login-screen.hidden { display: none; }
.logout-link {
  position: fixed;
  top: 16px;
  right: 20px;
  color: #8B75A0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
  transition: color 0.2s;
}
.logout-link:hover { color: #FFD4B8; }
</style>
</head>
<body>
<a class="logout-link" id="logout-btn" style="display:none;">退出登录</a>
<div class="container">
  <!-- Login Screen -->
  <div id="login-screen">
    <h1>🏝️ 饿饿一号</h1>
    <div class="subtitle">管理后台</div>
    <input type="password" id="password-input" placeholder="输入密码" autocomplete="off">
    <button class="btn" id="login-btn">登录</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <!-- Main Screen -->
  <div id="main-screen" class="hidden">
    <h1>🏝️ 饿饿一号</h1>
    <div class="subtitle">写一封信给她</div>

    <div class="form-card">
      <h2>✎ 写新信</h2>
      <div class="field">
        <label>标题</label>
        <input type="text" id="letter-title" placeholder="给信起个名字">
      </div>
      <div class="field">
        <label>正文</label>
        <textarea id="letter-content" placeholder="写下你想对她说的话……"></textarea>
      </div>
      <button class="btn" id="send-btn">发送</button>
      <div class="success-msg" id="send-success"></div>
      <div class="error-msg" id="send-error"></div>
    </div>

    <div class="section-title">
      <span>已发出的信</span>
      <span class="subtitle" id="letter-count" style="margin:0;font-size:12px;"></span>
    </div>
    <div id="letter-list"></div>

    <div class="section-title" style="margin-top:28px;">
      <span>她写的随笔</span>
      <span class="subtitle" id="journal-count" style="margin:0;font-size:12px;"></span>
    </div>
    <div id="journal-list"></div>
  </div>
</div>

<script>
let token = null;
const LETTER_ARCHIVE_KEY = 'ehao_letter_archive';

// --- DOM refs ---
const loginScreen = document.getElementById('login-screen');
const mainScreen = document.getElementById('main-screen');
const passwordInput = document.getElementById('password-input');
const loginBtn = document.getElementById('login-btn');
const loginError = document.getElementById('login-error');
const logoutBtn = document.getElementById('logout-btn');
const titleInput = document.getElementById('letter-title');
const contentInput = document.getElementById('letter-content');
const sendBtn = document.getElementById('send-btn');
const sendSuccess = document.getElementById('send-success');
const sendError = document.getElementById('send-error');
const letterListEl = document.getElementById('letter-list');
const letterCount = document.getElementById('letter-count');
const journalListEl = document.getElementById('journal-list');
const journalCount = document.getElementById('journal-count');

function getArchivedLetters() {
  try {
    return JSON.parse(localStorage.getItem(LETTER_ARCHIVE_KEY)) || [];
  } catch { return []; }
}

function saveArchivedLetters(letters) {
  localStorage.setItem(LETTER_ARCHIVE_KEY, JSON.stringify(letters));
}

function upsertArchivedLetter(letter) {
  const letters = getArchivedLetters();
  const index = letters.findIndex(item => item.id === letter.id);
  if (index >= 0) {
    letters[index] = { ...letters[index], ...letter };
  } else {
    letters.push(letter);
  }
  saveArchivedLetters(letters);
}

function removeArchivedLetter(id) {
  const letters = getArchivedLetters().filter(item => item.id !== id);
  saveArchivedLetters(letters);
}

// --- Auth ---
async function login() {
  const pw = passwordInput.value.trim();
  if (!pw) return;
  loginError.textContent = '';
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (!res.ok) { loginError.textContent = '密码错误'; return; }
    const data = await res.json();
    token = data.token;
    localStorage.setItem('ehao_admin_token', token);
    showMain();
  } catch { loginError.textContent = '连接失败'; }
}

loginBtn.addEventListener('click', login);
passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function logout() {
  token = null;
  localStorage.removeItem('ehao_admin_token');
  loginScreen.classList.remove('hidden');
  mainScreen.classList.add('hidden');
  logoutBtn.style.display = 'none';
  passwordInput.value = '';
}

logoutBtn.addEventListener('click', logout);

function showMain() {
  loginScreen.classList.add('hidden');
  mainScreen.classList.remove('hidden');
  logoutBtn.style.display = 'block';
  loadLetters();
  loadJournal();
}

// --- Check stored token ---
(function() {
  const stored = localStorage.getItem('ehao_admin_token');
  if (stored) { token = stored; showMain(); }
})();

// --- Load letters ---
async function loadLetters() {
  try {
    const res = await fetch('/api/letters');
    const data = await res.json();
    const letters = data.letters || [];
    if (letters.length === 0) {
      await restoreArchivedLetters();
      const archive = getArchivedLetters();
      renderLetters(archive);
      return;
    }
    saveArchivedLetters(letters);
    renderLetters(letters);
  } catch {
    renderLetters(getArchivedLetters());
  }
}

async function restoreArchivedLetters() {
  const archivedLetters = getArchivedLetters().sort((a, b) => a.id - b.id);
  if (archivedLetters.length === 0 || !token) return;
  for (const letter of archivedLetters) {
    try {
      await fetch('/api/letters', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(letter)
      });
    } catch {}
  }
}

async function loadJournal() {
  try {
    const res = await fetch('/api/journal', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) {
      journalCount.textContent = '';
      journalListEl.innerHTML = '<div class="empty-msg">需要先登录后才能查看 ✦</div>';
      return;
    }
    const data = await res.json();
    renderJournal(data.entries || []);
  } catch {
    journalCount.textContent = '';
    journalListEl.innerHTML = '<div class="empty-msg">加载失败 ✦</div>';
  }
}

function renderJournal(entries) {
  journalListEl.innerHTML = '';
  journalCount.textContent = '共 ' + entries.length + ' 篇';
  if (entries.length === 0) {
    journalListEl.innerHTML = '<div class="empty-msg">还没有写过随笔 ✦</div>';
    return;
  }
  entries.sort((a, b) => b.id - a.id).forEach(e => {
    const card = document.createElement('div');
    card.className = 'journal-card';
    card.innerHTML = `
      <div class="date">${e.date}</div>
      <div class="text">${escapeHtml(e.text)}</div>
      <div class="actions">
        <button class="delete-btn" data-id="${e.id}">✕</button>
      </div>
    `;
    card.querySelector('.delete-btn').addEventListener('click', () => deleteJournal(e.id));
    journalListEl.appendChild(card);
  });
}

function renderLetters(letters) {
  letterListEl.innerHTML = '';
  letterCount.textContent = '共 ' + letters.length + ' 封';
  if (letters.length === 0) {
    letterListEl.innerHTML = '<div class="empty-msg">还没有写过信 ✦</div>';
    return;
  }
  letters.sort((a, b) => b.id - a.id).forEach(l => {
    const card = document.createElement('div');
    card.className = 'letter-card';
    card.innerHTML = `
      <div class="info">
        <div class="date">${l.date}</div>
        <div class="title">${l.title}</div>
      </div>
      <div class="actions">
        <span class="status ${l.read ? 'read' : 'unread'}">${l.read ? '已读' : '未读'}</span>
        <button class="delete-btn" data-id="${l.id}">✕</button>
      </div>
    `;
    card.querySelector('.delete-btn').addEventListener('click', () => deleteLetter(l.id));
    letterListEl.appendChild(card);
  });
}

// --- Send letter ---
async function sendLetter() {
  const title = titleInput.value.trim();
  const content = contentInput.value.trim();
  if (!title || !content) {
    sendError.textContent = '标题和内容不能为空';
    return;
  }
  sendError.textContent = '';
  sendSuccess.textContent = '';
  sendBtn.disabled = true;
  const draftLetter = {
    id: Date.now(),
    title,
    content,
    date: new Date().toISOString().slice(0, 10),
    read: false
  };
  try {
    const res = await fetch('/api/letters', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify(draftLetter)
    });
    if (!res.ok) {
      upsertArchivedLetter(draftLetter);
      renderLetters(getArchivedLetters());
      sendError.textContent = '服务器没存住，但这封信已经替你留档了';
      return;
    }
    const data = await res.json();
    upsertArchivedLetter(data.letter || draftLetter);
    sendSuccess.textContent = '信已送达 ✦';
    titleInput.value = '';
    contentInput.value = '';
    loadLetters();
  } catch {
    upsertArchivedLetter(draftLetter);
    renderLetters(getArchivedLetters());
    sendError.textContent = '连接失败，但这封信已经替你留档了';
  }
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendLetter);

// --- Delete letter ---
async function deleteLetter(id) {
  if (!confirm('确定删除这封信吗？')) return;
  removeArchivedLetter(id);
  renderLetters(getArchivedLetters());
  try {
    await fetch('/api/letters/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    loadLetters();
  } catch {}
}

async function deleteJournal(id) {
  if (!confirm('确定删除这篇随笔吗？')) return;
  try {
    await fetch('/api/journal/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    loadJournal();
  } catch {}
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
